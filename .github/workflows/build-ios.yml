name: Build ClaudeShell iOS

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      debug_ssh:
        description: 'Enable SSH debug session (tmate)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Cache xcodegen
      id: cache-xcodegen
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/xcodegen
        key: xcodegen-${{ runner.os }}

    - name: Install xcodegen
      if: steps.cache-xcodegen.outputs.cache-hit != 'true'
      run: brew install xcodegen

    - name: Generate Xcode project
      run: bash generate-xcodeproj.sh

    - name: Select Xcode
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        sudo xcode-select -s "$XCODE_PATH"

    # Skip simulator build — go straight to device build (catches all compile errors too)
    - name: Build for device (Release)
      run: |
        xcodebuild build \
          -project ClaudeShell.xcodeproj \
          -scheme ClaudeShell \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath build/derived \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=YES \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          -quiet

    - name: Package IPA
      run: |
        set -e
        APP_PATH=$(find build/derived -name "ClaudeShell.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then echo "FATAL: .app not found"; exit 1; fi

        # Quick validation
        /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist"
        EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
        lipo -info "$APP_PATH/$EXEC"

        # Package
        mkdir -p build/ipa/Payload
        cp -r "$APP_PATH" build/ipa/Payload/
        cd build/ipa && zip -r -q ../ClaudeShell-sideload.ipa Payload && cd ../..
        ls -lh build/ClaudeShell-sideload.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ClaudeShell-sideload
        path: build/ClaudeShell-sideload.ipa

    - name: SSH debug session (tmate)
      if: inputs.debug_ssh == 'true' || failure()
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 15
      with:
        limit-access-to-actor: true
